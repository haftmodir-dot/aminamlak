<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امین املاک</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
direction:rtl;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
color:white;
}

/* LOGIN */
.loginBox{
max-width:320px;
margin:120px auto;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:14px;
box-sizing:border-box;
}

input,select,textarea{
background:white;
color:black;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:6px;
font-weight:bold;
cursor:pointer;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}
.purple{background:#a855f7;color:white;}

#app{display:none;padding:15px;}

header{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.12);
padding:12px;
border-radius:15px;
margin:10px 0;
}

.gallery{
display:flex;
gap:6px;
overflow-x:auto;
}

.gallery img{
width:100px;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

#lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}
#lightbox img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="loginBox">
<h2>🏢 امین املاک</h2>
<p>ورود به سیستم</p>

<input type="password" id="pass" placeholder="رمز عبور">
<button class="purple" id="loginBtn">ورود</button>
<p id="err" style="color:#ff6b6b;"></p>
</div>

<!-- APP -->
<div id="app">

<header>🏢 امین املاک - نسخه نهایی</header>

<h3>➕ ثبت ملک</h3>

<input id="title" placeholder="عنوان">
<input id="address" placeholder="آدرس">
<input id="region" placeholder="منطقه">

<select id="type" onchange="togglePrice()">
<option value="فروش">فروش</option>
<option value="اجاره">اجاره</option>
</select>

<select id="status">
<option value="موجود">موجود</option>
<option value="فروخته شده">فروخته شده</option>
<option value="اجاره داده شده">اجاره داده شده</option>
</select>

<div id="saleBox">
<input id="price" placeholder="قیمت (میلیون تومان)">
</div>

<div id="rentBox" style="display:none;">
<input id="mortgage" placeholder="رهن">
<input id="rent" placeholder="اجاره">
</div>

<input id="area" placeholder="متراژ">
<input id="rooms" placeholder="تعداد اتاق">
<input id="age" placeholder="سن بنا">

<input id="owner" placeholder="مالک">
<input id="phone" placeholder="تلفن">

<textarea id="details" placeholder="توضیحات کامل"></textarea>

<input type="file" id="img" multiple>

<button class="green" id="saveBtn">ثبت ملک</button>

<button class="blue" onclick="backup()">📤 بکاپ</button>

<input type="file" id="restoreFile" style="display:none" onchange="restore(this)">
<button class="purple" onclick="restoreFile.click()">📥 بازیابی</button>

<h3>📋 لیست املاک</h3>
<div id="list"></div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script>

let data = JSON.parse(localStorage.getItem("amlak_final_fixed") || "[]");

/* ---------- LOGIN FIXED ---------- */
document.getElementById("loginBtn").addEventListener("click",function(){
let pass = document.getElementById("pass").value;

if(pass === "4029"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}else{
document.getElementById("err").innerText="❌ رمز اشتباه است";
}
});

/* ---------- TOGGLE ---------- */
function togglePrice(){
document.getElementById("saleBox").style.display =
type.value==="فروش"?"block":"none";

document.getElementById("rentBox").style.display =
type.value==="اجاره"?"block":"none";
}

/* ---------- SAVE FIXED ---------- */
document.getElementById("saveBtn").addEventListener("click",function(){

let files = document.getElementById("img").files;
let images = [];

if(files.length === 0){
store([]);
return;
}

let count = 0;

for(let i=0;i<files.length;i++){
let reader = new FileReader();

reader.onload=function(e){
images.push(e.target.result);
count++;

if(count === files.length){
store(images);
}
};

reader.readAsDataURL(files[i]);
}
});

function store(images){

let obj = {
id:Date.now(),
title:title.value,
address:address.value,
region:region.value,
type:type.value,
status:status.value,
price:type.value==="فروش"?price.value:null,
mortgage:type.value==="اجاره"?mortgage.value:null,
rent:type.value==="اجاره"?rent.value:null,
area:area.value,
rooms:rooms.value,
age:age.value,
owner:owner.value,
phone:phone.value,
details:details.value,
images:images
};

data.push(obj);
localStorage.setItem("amlak_final_fixed",JSON.stringify(data));

clear();
render();
}

/* ---------- CLEAR ---------- */
function clear(){
title.value="";
address.value="";
region.value="";
price.value="";
mortgage.value="";
rent.value="";
area.value="";
rooms.value="";
age.value="";
owner.value="";
phone.value="";
details.value="";
img.value="";
}

/* ---------- DELETE ---------- */
function del(id){
data=data.filter(x=>x.id!==id);
localStorage.setItem("amlak_final_fixed",JSON.stringify(data));
render();
}

/* ---------- RENDER ---------- */
function render(){

list.innerHTML="";

data.forEach(x=>{

let priceText =
x.type==="فروش"
? `💰 ${x.price}`
: `🏦 ${x.mortgage} | ${x.rent}`;

let imgs="";
if(x.images){
imgs=`<div class="gallery">`+
x.images.map(i=>`<img src="${i}" onclick="openImg('${i}')">`).join("")+
`</div>`;
}

list.innerHTML+=`
<div class="card">
<b>${x.title}</b><br>
📍 ${x.address} (${x.region})<br>
📌 ${x.status}<br>
${priceText}<br>
🏠 ${x.area} متر | ${x.rooms} خواب | ${x.age} سال<br>
👤 ${x.owner} | 📞 ${x.phone}<br>
📝 ${x.details}<br>

${imgs}

<button class="red" onclick="del(${x.id})">حذف</button>
</div>
`;
});
}

/* ---------- LIGHTBOX ---------- */
function openImg(src){
lightboxImg.src=src;
lightbox.style.display="flex";
}

/* ---------- BACKUP ---------- */
function backup(){
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="amin-amlak-backup.json";
a.click();
}

/* ---------- RESTORE ---------- */
function restore(input){
let file=input.files[0];
let reader=new FileReader();

reader.onload=function(e){
data=JSON.parse(e.target.result);
localStorage.setItem("amlak_final_fixed",JSON.stringify(data));
render();
};

reader.readAsText(file);
}

render();

</script>

</body>
</html>
