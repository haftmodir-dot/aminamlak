<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امین املاک ULTRA+</title>

<style>
body{
font-family:sans-serif;
direction:rtl;
margin:0;
background:#eef2f7;
}

header{
background:#0f172a;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{padding:15px;}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
}

.add{background:#22c55e;color:white;}
.del{background:#ef4444;color:white;}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
margin-top:5px;
}

.gallery{
display:flex;
gap:5px;
overflow-x:auto;
}

.gallery img{
width:120px;
height:90px;
object-fit:cover;
flex-shrink:0;
}
</style>
</head>

<body>

<header>🏠 امین املاک ULTRA+</header>

<div class="container">

<h3>➕ ثبت ملک</h3>

<input id="title" placeholder="عنوان">
<input id="address" placeholder="آدرس">

<select id="type" onchange="togglePrice()">
<option value="فروش">فروش</option>
<option value="اجاره">اجاره</option>
</select>

<div id="saleBox">
<input id="price" placeholder="قیمت (میلیون تومان)">
</div>

<div id="rentBox" style="display:none;">
<input id="mortgage" placeholder="رهن (میلیون تومان)">
<input id="rent" placeholder="اجاره (میلیون تومان)">
</div>

<input id="owner" placeholder="مالک">
<input id="phone" placeholder="تلفن">
<textarea id="details" placeholder="توضیحات"></textarea>

<input type="file" id="img" multiple>

<button class="add" onclick="saveProperty()">ثبت ملک</button>

<h3>📋 انتخاب ملک</h3>

<select id="selector" onchange="showProperty()">
<option value="">-- انتخاب ملک --</option>
</select>

<div id="view"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("amlak_ultra_plus") || "[]");

function togglePrice(){
let t = type.value;
saleBox.style.display = t==="فروش" ? "block":"none";
rentBox.style.display = t==="اجاره" ? "block":"none";
}

function saveProperty(){

let files = img.files;
let images = [];

let loaded = 0;

if(files.length === 0){
store([]);
return;
}

for(let i=0;i<files.length;i++){
let reader = new FileReader();

reader.onload = function(e){
images.push(e.target.result);
loaded++;

if(loaded === files.length){
store(images);
}
};

reader.readAsDataURL(files[i]);
}
}

function store(images){

let obj = {
id: Date.now(),
title:title.value,
address:address.value,
type:type.value,
owner:owner.value,
phone:phone.value,
details:details.value,
images:images,
price: type.value==="فروش" ? price.value : null,
mortgage: type.value==="اجاره" ? mortgage.value : null,
rent: type.value==="اجاره" ? rent.value : null
};

data.push(obj);
localStorage.setItem("amlak_ultra_plus", JSON.stringify(data));

clear();
updateSelector();
alert("ثبت شد ✔");
}

function clear(){
title.value="";
address.value="";
price.value="";
mortgage.value="";
rent.value="";
owner.value="";
phone.value="";
details.value="";
img.value="";
}

function updateSelector(){

selector.innerHTML = `<option value="">-- انتخاب ملک --</option>`;

data.forEach(x=>{
selector.innerHTML += `<option value="${x.id}">${x.title}</option>`;
});
}

function showProperty(){

let id = selector.value;
let x = data.find(i=>i.id == id);

if(!x){
view.innerHTML="";
return;
}

let priceText =
x.type==="فروش"
? `💰 ${x.price} میلیون تومان`
: `🏦 رهن: ${x.mortgage} | اجاره: ${x.rent} میلیون`;

let imgs = "";

if(x.images && x.images.length){
imgs = `<div class="gallery">` +
x.images.map(i=>`<img src="${i}">`).join("") +
`</div>`;
}

view.innerHTML = `
<div class="card">
<b>${x.title}</b><br>
📍 ${x.address}<br>
${priceText}<br>
🏷 ${x.type}<br>
👤 ${x.owner}<br>
📞 <a href="tel:${x.phone}">${x.phone}</a><br>
📝 ${x.details}<br>

${imgs}
</div>
`;
}

updateSelector();

</script>

</body>
</html>
