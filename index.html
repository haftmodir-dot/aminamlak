<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امین املاک PRO</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
direction:rtl;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
color:white;
}

.loginBox{
max-width:320px;
margin:100px auto;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
text-align:center;
}

#app{display:none;padding:15px;}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
font-size:14px;
}

input,select,textarea{background:white;color:black;}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:6px;
font-weight:bold;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}
.purple{background:#a855f7;color:white;}

.card{
background:rgba(255,255,255,0.12);
padding:12px;
border-radius:15px;
margin:10px 0;
}

.gallery{
display:flex;
gap:6px;
overflow-x:auto;
}

.gallery img{
width:100px;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

#lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}
#lightbox img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="loginBox">
<h2>🏠 امین املاک</h2>
<input type="password" id="pass" placeholder="رمز">
<button class="purple" onclick="login()">ورود</button>
<p id="err"></p>
</div>

<!-- APP -->
<div id="app">

<h3>➕ ثبت ملک</h3>

<input id="title" placeholder="عنوان">
<input id="address" placeholder="آدرس">
<input id="region" placeholder="منطقه">

<select id="type" onchange="toggle()">
<option value="فروش">فروش</option>
<option value="اجاره">اجاره</option>
</select>

<select id="status">
<option value="موجود">موجود</option>
<option value="فروخته شده">فروخته شده</option>
<option value="اجاره داده شده">اجاره داده شده</option>
</select>

<div id="saleBox">
<input id="price" placeholder="قیمت (میلیون)">
</div>

<div id="rentBox" style="display:none;">
<input id="mortgage" placeholder="رهن">
<input id="rent" placeholder="اجاره">
</div>

<input id="area" placeholder="متراژ">
<input id="rooms" placeholder="اتاق">
<input id="age" placeholder="سن بنا">

<input id="owner" placeholder="مالک">
<input id="phone" placeholder="تلفن">

<textarea id="details" placeholder="توضیحات کامل"></textarea>

<input type="file" id="img" multiple>

<button class="green" onclick="save()">ثبت ملک</button>
<button class="blue" onclick="backup()">بکاپ</button>

<input type="file" id="restoreFile" style="display:none" onchange="restore(this)">
<button class="purple" onclick="restoreFile.click()">بازیابی</button>

<h3>📋 لیست املاک</h3>

<div id="list"></div>

</div>

<div id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script>

let data = JSON.parse(localStorage.getItem("amlak_pro_final") || "[]");

function login(){
if(pass.value==="4029"){
login.style.display="none";
app.style.display="block";
render();
}else err.innerText="❌ رمز اشتباه";
}

function toggle(){
saleBox.style.display = type.value==="فروش"?"block":"none";
rentBox.style.display = type.value==="اجاره"?"block":"none";
}

/* ---------- FIX SAVE (IMPORTANT) ---------- */
function save(){

let files = img.files;
let images = [];

if(files.length === 0){
store([]);
return;
}

let count=0;

for(let i=0;i<files.length;i++){
let reader = new FileReader();

reader.onload=function(e){
images.push(e.target.result);
count++;
if(count===files.length) store(images);
};

reader.readAsDataURL(files[i]);
}
}

function store(images){

let obj={
id:Date.now(),
title:title.value,
address:address.value,
region:region.value,
type:type.value,
status:status.value,
price:type.value==="فروش"?price.value:null,
mortgage:type.value==="اجاره"?mortgage.value:null,
rent:type.value==="اجاره"?rent.value:null,
area:area.value,
rooms:rooms.value,
age:age.value,
owner:owner.value,
phone:phone.value,
details:details.value,
images:images
};

data.push(obj);
localStorage.setItem("amlak_pro_final",JSON.stringify(data));

clear();
render();
}

function clear(){
title.value="";
address.value="";
region.value="";
price.value="";
mortgage.value="";
rent.value="";
area.value="";
rooms.value="";
age.value="";
owner.value="";
phone.value="";
details.value="";
img.value="";
}

function del(id){
data=data.filter(x=>x.id!==id);
localStorage.setItem("amlak_pro_final",JSON.stringify(data));
render();
}

/* ---------- RENDER ---------- */
function render(){

list.innerHTML="";

data.forEach(x=>{

let priceText =
x.type==="فروش"
? `💰 ${x.price}`
: `🏦 ${x.mortgage} | ${x.rent}`;

let imgs="";
if(x.images){
imgs=`<div class="gallery">`+
x.images.map(i=>`<img src="${i}" onclick="openImg('${i}')">`).join("")+
`</div>`;
}

list.innerHTML+=`
<div class="card">
<b>${x.title}</b><br>
📍 ${x.address} (${x.region})<br>
📌 وضعیت: ${x.status}<br>
${priceText}<br>
🏠 ${x.area} متر | ${x.rooms} خواب | ${x.age} سال<br>
👤 ${x.owner} | 📞 ${x.phone}<br>
📝 ${x.details}<br>

${imgs}

<button class="red" onclick="del(${x.id})">حذف</button>
</div>
`;
});
}

function openImg(src){
lightboxImg.src=src;
lightbox.style.display="flex";
}

function backup(){
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="amlak-backup.json";
a.click();
}

function restore(input){
let file=input.files[0];
let reader=new FileReader();
reader.onload=function(e){
data=JSON.parse(e.target.result);
localStorage.setItem("amlak_pro_final",JSON.stringify(data));
render();
};
reader.readAsText(file);
}

render();

</script>

</body>
</html>
